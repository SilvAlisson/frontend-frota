<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="KLIN Frota — Sistema integrado de gestão de frota, jornadas, manutenções e abastecimentos." />
  <meta name="theme-color" content="#52638a" />

  <!--
    ✅ Estratégia de Font Loading Otimizada (Performance Optimizer)
    1. preconnect: Abre conexão TCP/TLS com Google Fonts antes do browser precisar
    2. preload:    Prioriza o download do CSS de fontes (High Priority Resource Hint)
    3. onload:     media="print" → onload="this.media='all'" = carregamento NÃO-BLOQUEANTE
       Isso elimina o render-blocking que causava +200ms no FCP em conexões lentas
    4. noscript:   Fallback seguro para ambientes sem JavaScript
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Inter (Dados Numéricos e Corpo) + Outfit (Headers) + JetBrains Mono -->
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
    as="style"
    onload="this.onload=null;this.rel='stylesheet'"
  />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
    />
  </noscript>

  <title>KLIN - Gestão de Frota</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
