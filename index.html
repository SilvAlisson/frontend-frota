<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, interactive-widget=resizes-content" />
  <meta name="description" content="KLIN Frota — Sistema integrado de gestão de frota, jornadas, manutenções e abastecimentos." />
  <meta name="theme-color" content="#52638a" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Chivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    as="style"
    onload="this.onload=null;this.rel='stylesheet'"
  />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Chivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
  </noscript>

  <script>
    window.addEventListener('error', function(e) {
      // Verifica se a falha ocorreu no carregamento de um <script> da pasta /assets/
      if (e.target && e.target.tagName === 'SCRIPT' && e.target.src && e.target.src.includes('/assets/')) {
        console.warn('Detectada versão fantasma do sistema. Limpando cache e atualizando...');
        
        // Impede que o navegador entre em um loop infinito de recarregamento
        if (!sessionStorage.getItem('klin_app_reloaded')) {
          sessionStorage.setItem('klin_app_reloaded', '1');
          
          // Remove o cache do PWA que estava segurando o HTML velho
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              for (var i = 0; i < regs.length; i++) {
                regs[i].unregister();
              }
              window.location.reload(true);
            }).catch(function() {
              window.location.reload(true);
            });
          } else {
            window.location.reload(true);
          }
        }
      }
    }, true); 
  </script>

  <title>KLIN - Gestão de Frota</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
<!-- impeccable-live-start -->
<script src="http://localhost:8400/live.js"></script>
<!-- impeccable-live-end -->
</body>

</html>
